version: '3.8'
services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./:/app:delegated
    environment:
      - DEBUG=1
    depends_on: []

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://web:8000/api
    volumes:
      - ./frontend:/app:delegated
    depends_on:
      - web
